name: AppSec Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
  DEFECTDOJO_TOKEN: ${{ secrets.DEFECTDOJO_TOKEN }}
  DEFECTDOJO_PRODUCT_ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}

jobs:
  # ── Unit & Integration Tests ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend tests
        working-directory: backend
        run: npm ci && npm test -- --passWithNoTests

      - name: Frontend tests
        working-directory: frontend
        run: npm ci && npm run test:unit -- --run

  # ── SCA: OWASP Dependency Check ──────────────────────────────────────────
  dependency-check:
    name: Dependency Check (SCA)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: bmi-appsec
          path: .
          format: JSON
          args: >
            --enableRetired
            --out reports/dependency-check

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check/dependency-check-report.json

      - name: Import to DefectDojo
        if: env.DEFECTDOJO_URL != ''
        run: |
          curl -s -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DEFECTDOJO_TOKEN" \
            -F "scan_type=Dependency Check Scan" \
            -F "product_id=$DEFECTDOJO_PRODUCT_ID" \
            -F "engagement_name=CI - $(date +%Y-%m-%d)" \
            -F "file=@reports/dependency-check/dependency-check-report.json" \
            -F "active=true" \
            -F "verified=false"

  # ── Container Scanning: Trivy ─────────────────────────────────────────────
  trivy:
    name: Trivy (Container Scan)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t bmi-backend:ci --target production ./backend

      - name: Build frontend image
        run: docker build -t bmi-frontend:ci --target production ./frontend

      - name: Trivy scan - backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bmi-backend:ci
          format: json
          output: reports/trivy-backend.json
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy scan - frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bmi-frontend:ci
          format: json
          output: reports/trivy-frontend.json
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: reports/trivy-*.json

      - name: Import backend scan to DefectDojo
        if: env.DEFECTDOJO_URL != ''
        run: |
          curl -s -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DEFECTDOJO_TOKEN" \
            -F "scan_type=Trivy Scan" \
            -F "product_id=$DEFECTDOJO_PRODUCT_ID" \
            -F "engagement_name=CI - $(date +%Y-%m-%d)" \
            -F "file=@reports/trivy-backend.json" \
            -F "active=true" \
            -F "verified=false"

      - name: Import frontend scan to DefectDojo
        if: env.DEFECTDOJO_URL != ''
        run: |
          curl -s -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DEFECTDOJO_TOKEN" \
            -F "scan_type=Trivy Scan" \
            -F "product_id=$DEFECTDOJO_PRODUCT_ID" \
            -F "engagement_name=CI - $(date +%Y-%m-%d)" \
            -F "file=@reports/trivy-frontend.json" \
            -F "active=true" \
            -F "verified=false"

  # ── DAST: OWASP ZAP ───────────────────────────────────────────────────────
  zap:
    name: OWASP ZAP (DAST)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Run ZAP baseline scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: http://localhost
          rules_file_name: infra/zap/zap-baseline.yaml
          cmd_options: '-J reports/zap-report.json'
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap-report.json

      - name: Import to DefectDojo
        if: env.DEFECTDOJO_URL != ''
        run: |
          curl -s -X POST "$DEFECTDOJO_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DEFECTDOJO_TOKEN" \
            -F "scan_type=ZAP Scan" \
            -F "product_id=$DEFECTDOJO_PRODUCT_ID" \
            -F "engagement_name=CI - $(date +%Y-%m-%d)" \
            -F "file=@reports/zap-report.json" \
            -F "active=true" \
            -F "verified=false"

      - name: Tear down stack
        if: always()
        run: docker compose down
