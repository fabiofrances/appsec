services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "3000:3000"
      - "9464:9464"
    environment:
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=bmi-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - jaeger
    networks:
      - appsec

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - appsec

  jaeger:
    image: jaegertracing/jaeger:2.6.0
    command: ["--config=/config/jaeger.yml"]
    volumes:
      - ./infra/jaeger/config.yml:/config/jaeger.yml:ro
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - appsec

  prometheus:
    image: prom/prometheus:v3.3.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    networks:
      - appsec

  # ── DefectDojo stack ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=defectdojo
      - POSTGRES_USER=defectdojo
      - POSTGRES_PASSWORD=defectdojo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appsec

  redis:
    image: redis:7-alpine
    networks:
      - appsec

  defectdojo-initializer:
    image: defectdojo/defectdojo-django:2.57.2
    entrypoint: ["/entrypoint-initializer.sh"]
    environment:
      - DD_ALLOWED_HOSTS=*
      - DD_ADMIN_USER=admin
      - DD_ADMIN_MAIL=admin@appsec.local
      - DD_ADMIN_FIRST_NAME=Admin
      - DD_ADMIN_LAST_NAME=User
      - DD_ADMIN_PASSWORD=admin@dojo123
      - DD_DATABASE_URL=postgresql://defectdojo:defectdojo@postgres:5432/defectdojo
      - DD_CELERY_BROKER_URL=redis://redis:6379/0
      - DD_SECRET_KEY=OF5fG1JmCFlFA1yoIKKwX5HZwVKV1arP
    depends_on:
      - postgres
      - redis
    networks:
      - appsec

  # named 'uwsgi' so defectdojo-nginx resolves the upstream correctly
  uwsgi:
    image: defectdojo/defectdojo-django:2.57.2
    environment:
      - DD_ALLOWED_HOSTS=*
      - DD_DATABASE_URL=postgresql://defectdojo:defectdojo@postgres:5432/defectdojo
      - DD_CELERY_BROKER_URL=redis://redis:6379/0
      - DD_SECRET_KEY=OF5fG1JmCFlFA1yoIKKwX5HZwVKV1arP
    depends_on:
      - defectdojo-initializer
    networks:
      - appsec

  defectdojo-nginx:
    image: defectdojo/defectdojo-nginx:2.57.2
    ports:
      - "8081:8080"
    depends_on:
      - uwsgi
    networks:
      - appsec

  defectdojo-celeryworker:
    image: defectdojo/defectdojo-django:2.57.2
    entrypoint: ["/entrypoint-celery-worker.sh"]
    environment:
      - DD_DATABASE_URL=postgresql://defectdojo:defectdojo@postgres:5432/defectdojo
      - DD_CELERY_BROKER_URL=redis://redis:6379/0
      - DD_SECRET_KEY=OF5fG1JmCFlFA1yoIKKwX5HZwVKV1arP
    depends_on:
      - defectdojo-initializer
    networks:
      - appsec

  defectdojo-celerybeat:
    image: defectdojo/defectdojo-django:2.57.2
    entrypoint: ["/entrypoint-celery-beat.sh"]
    environment:
      - DD_DATABASE_URL=postgresql://defectdojo:defectdojo@postgres:5432/defectdojo
      - DD_CELERY_BROKER_URL=redis://redis:6379/0
      - DD_SECRET_KEY=OF5fG1JmCFlFA1yoIKKwX5HZwVKV1arP
    depends_on:
      - defectdojo-initializer
    networks:
      - appsec

networks:
  appsec:
    driver: bridge

volumes:
  postgres_data:
